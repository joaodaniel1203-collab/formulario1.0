<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Formulário de Usuário e Senha</title>
      <h1>Formulário de Usuário e Senha</h1>
      <style>
            *{
                  margin: 0;
                  padding: 0;
                  font-family: Arial, Helvetica, sans-serif;
            }
            body{
                        background-color: #f0f0f0;
                  }
                  section {
                        background-color: #fff;
                        padding: 20px;
                        margin: 20px auto;
                        width: 300px;
                        border-radius: 5px;
                        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            label {
                        display: block;
                        margin-bottom: 5px;
                  }
            input[type="text"], input[type="password"] {
                        width: 100%;
                        padding: 8px;
                        margin-bottom: 10px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                  }
            input[type="submit"] {
                        background-color: #4CAF50;
                        color: white;
                        padding: 10px 15px;
                        border: none;
                        border-radius: 4px;
                        cursor: pointer;
                        font-family: cursive
                  }
            input[type="submit"]:hover {
                        background-color: #45a049;
                  }
      </style>
</head>
<body>
      <section id="formulario">
            <form autocomplete="off" action="/action_page.php" method="post">
                  <label for="inome">Nome de Usuário:</label>
                  <input type="text" id="inome" name="inome" placeholder="Digite seu nome de usuário" autocomplete="username">
                  <br><br>
                  <label for="isenha">Senha:</label>
                  <input type="password" id="isenha" name="isenha" placeholder="Digite sua senha">
                  <br><br>
                  <input type="submit" value="Entrar">
            </form>
      </section> 
</body>
</html>
